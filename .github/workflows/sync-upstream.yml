name: Sync upstream

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream main
        run: git fetch https://github.com/PHD59fr/Netflix-HouseHold-AutoValidator.git main:refs/remotes/upstream/main

      - name: Merge upstream main
        run: |
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date."
            exit 0
          fi

          git merge --no-commit --no-ff upstream/main

          # Keep this fork's Actions configuration. The built-in GITHUB_TOKEN
          # cannot push upstream changes beneath .github/workflows.
          git restore --source=HEAD --staged --worktree -- .github/workflows
          git commit --no-edit

      - name: Push when main changed
        run: |
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            git push origin HEAD:main
          else
            echo "Already up to date."
          fi
